<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Superhero</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="neon-glow">
            <h1>HAPPY FATHER'S DAY</h1>
            <p class="tagline">My Father, My Hero</p>
        </div>

        <div class="interactive-box">
            <p id="quote">"Behind every great daughter/son is a truly amazing father."</p>
            <button onclick="changeQuote()">Change Message ✨</button>
        </div>
    </div>

    <script>
        const quotes = [
            "\"Behind every great daughter/son is a truly amazing father.\"",
            "\"Dad: A son's first hero, a daughter's first love.\"",
            "\"A father is someone you look up to no matter how tall you grow.\"",
            "\"Thank you for always making me feel safe and loved.\""
        ];
        let index = 0;
        
        function changeQuote() {
            index = (index + 1) % quotes.length;
            document.getElementById('quote').innerText = quotes[index];
        }
    </script>
</body>
</html>
