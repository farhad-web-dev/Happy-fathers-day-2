<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Superhero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="neon-glow">
            <h1>HAPPY FATHER'S DAY</h1>
            <p class="tagline">My Father, My Hero</p>
        </div>

        <div class="interactive-box">
            <p id="quote">"Behind every great daughter/son is a truly amazing father."</p>
            <button onclick="changeQuote()">Next Message ✨</button>
            <button onclick="openNeonModal()" class="special-btn">Special Surprise 🎁</button>
        </div>
    </div>

    <div id="neonModal" class="neon-modal-overlay">
        <div class="neon-modal-content">
            <h2>You are irreplaceable! 🥇</h2>
            <p>Thank you for teaching me how to stand on my own feet and believe in myself. Happy Father's Day!</p>
            <button onclick="closeNeonModal()">Back</button>
        </div>
    </div>

    <script>
        const quotes = [
            "\"Behind every great daughter/son is a truly amazing father.\"",
            "\"Dad: A son's first hero, a daughter's first love.\"",
            "\"A father is someone you look up to no matter how tall you grow.\"",
            "\"Thank you for always making me feel safe and loved.\""
        ];
        let index = 0;
        
        function changeQuote() {
            index = (index + 1) % quotes.length;
            const quoteEl = document.getElementById('quote');
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                quoteEl.innerText = quotes[index];
                quoteEl.style.opacity = 1;
            }, 200);
        }

        function openNeonModal() {
            document.getElementById('neonModal').classList.add('active');
        }

        function closeNeonModal() {
            document.getElementById('neonModal').classList.remove('active');
        }
    </script>
</body>
</html>
