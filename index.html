<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Superhero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="heart-icon">👑</div>
        <h1>Happy Father's Day!</h1>
        <div class="quote-container">
            <p id="quote">"Behind every great daughter/son is a truly amazing father."</p>
        </div>
        
        <div class="btn-group">
            <button onclick="changeQuote()" class="secondary-btn">Next Message ✨</button>
            <button onclick="toggleModal(true)">Special Surprise 🎁</button>
        </div>
    </div>

    <div id="customModal" class="modal-overlay">
        <div class="modal-content">
            <h2>You are irreplaceable! 🥇</h2>
            <p>Thank you for teaching me how to stand on my own feet and believe in myself. Happy Father's Day, Papa! ❤️</p>
            <button class="close-btn" onclick="toggleModal(false)">Close</button>
        </div>
    </div>

    <script>
        const quotes = [
            "\"Behind every great daughter/son is a truly amazing father.\"",
            "\"Dad: A son's first hero, a daughter's first love.\"",
            "\"A father is someone you look up to no matter how tall you grow.\"",
            "\"Thank you for always making me feel safe and loved.\""
        ];
        let index = 0;
        
        function changeQuote() {
            index = (index + 1) % quotes.length;
            const quoteEl = document.getElementById('quote');
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                quoteEl.innerText = quotes[index];
                quoteEl.style.opacity = 1;
            }, 200);
        }

        function toggleModal(show) {
            const modal = document.getElementById('customModal');
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }
    </script>
</body>
</html>
